---
layout: default
---
<div class="post-wrap">
  <a href="/" class="back-link">← Dor Ringel</a>
  <article>
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.description %} · {{ page.description }}{% endif %}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <footer class="post-footer">
      <a href="/">← Back</a>
      <a href="{{ page.url | append: 'llms.txt' | relative_url }}" class="llms-link">llms.txt</a>
    </footer>
  </article>
</div>

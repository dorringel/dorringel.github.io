<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  {% seo %}

  <style>
    :root {
      --bg: #fdfdfc;
      --fg: #1a1a1a;
      --muted: #737373;
      --faint: #a3a3a3;
      --line: #e5e5e5;
      --code-bg: #f5f5f0;
      --code-border: #e8e8e3;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Index page - centered */
    .index-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .index-inner {
      width: 100%;
      max-width: 480px;
    }

    .index-inner h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .bio {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .bio a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: var(--line);
      text-underline-offset: 0.15em;
    }

    .bio a:hover {
      text-decoration-color: var(--fg);
    }

    .index-nav {
      padding: 14px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 0.92rem;
    }

    .index-nav a {
      color: var(--fg);
      text-decoration: none;
      margin-right: 20px;
    }

    .index-nav a:hover {
      color: var(--accent);
    }

    .posts {
      margin-top: 28px;
    }

    .post-entry {
      padding: 10px 0;
    }

    .post-entry + .post-entry {
      border-top: 1px solid var(--line);
    }

    .post-entry a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.96rem;
    }

    .post-entry a:hover {
      color: var(--accent);
    }

    .post-date {
      display: block;
      color: var(--faint);
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .post-desc {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 2px;
    }

    /* Post page - top-aligned, wider */
    .post-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .back-link {
      display: inline-block;
      color: var(--faint);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 32px;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--fg);
    }

    .post-header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .post-header h1 {
      font-size: clamp(1.8rem, 4.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .post-meta {
      color: var(--faint);
      font-size: 0.88rem;
    }

    /* Post content */
    .post-content {
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .post-content > * + * {
      margin-top: 1.2em;
    }

    .post-content h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-top: 2.5em;
      margin-bottom: 0.6em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    .post-content h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 2em;
      margin-bottom: 0.4em;
    }

    .post-content p {
      margin-top: 0;
      margin-bottom: 1em;
    }

    .post-content a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: var(--line);
      text-underline-offset: 0.15em;
      transition: text-decoration-color 0.15s;
    }

    .post-content a:hover {
      text-decoration-color: var(--fg);
    }

    .post-content strong {
      font-weight: 600;
    }

    /* Images */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 0.4em 0;
    }

    /* Code */
    .post-content code {
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    .post-content pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 6px;
      padding: 16px 20px;
      overflow-x: auto;
      line-height: 1.5;
      margin: 0.4em 0;
    }

    .post-content pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      border-radius: 0;
    }

    /* Lists */
    .post-content ul, .post-content ol {
      padding-left: 1.5em;
      margin-bottom: 1em;
    }

    .post-content li {
      margin-bottom: 0.3em;
    }

    /* Blockquote */
    .post-content blockquote {
      border-left: 3px solid var(--line);
      padding-left: 16px;
      color: var(--muted);
      font-style: italic;
    }

    /* HR */
    .post-content hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 2.5em 0;
    }

    /* Post footer */
    .post-footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.88rem;
    }

    .post-footer a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
    }

    .post-footer a:hover {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .post-wrap { padding: 32px 18px 60px; }
      .post-content pre { padding: 12px 14px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
